services:
  mysql:
    image: mysql:8.4
    container_name: gerenciamento-redes-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gerenciamento_redes
      MYSQL_USER: redes_user
      MYSQL_PASSWORD: redes_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
